<div>
  <div>
    <mat-toolbar color="primary">
      <mat-toolbar-row>
        <span class="toolbar-spacer"></span>
        <button (click)="back()" color="primary" mat-button style="color: white">
          <mat-icon>arrow_back_ios</mat-icon>
          {{ 'main.button_back' | translate }}
        </button>
      </mat-toolbar-row>
    </mat-toolbar>
  </div>
  <div class="app-form">
    <form (ngSubmit)="save(objForm.value)" [formGroup]="objForm!">
      <mat-form-field style="width: 100%;">
        <mat-label>{{ 'category.name' | translate }}</mat-label>
        <input #inputName appAutofocus formControlName="name" matInput maxlength="100" required>
        <mat-hint align="end">{{inputName.value.length || 0}}/100</mat-hint>
      </mat-form-field>
      <mat-form-field style="width: 100%;">
        <mat-label>{{ 'category.colorCode' | translate }}</mat-label>
        <input formControlName="colorCode" matInput type="color" required style="height: 40px; padding: 0;">
      </mat-form-field>
      <div style="margin-bottom: 20px;">
        <mat-checkbox formControlName="globalFlag">
          {{ 'category.globalFlag' | translate }}
        </mat-checkbox>
      </div>
      <button [disabled]="!objForm.valid" color="primary" mat-raised-button style="width: 200px">
        {{ 'main.button_save' | translate }}
      </button>
    </form>
  </div>
</div>
